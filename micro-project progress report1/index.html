<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Blind Box</title>

    <!-- Bubble font -->
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: rgb(241, 235, 225);
      }

      canvas {
        display: block;
      }

      #instructions {
  position: absolute;
  top: 5px; /* move higher */
  left: 50%;
  transform: translateX(-50%);

  text-align: center;
  max-width: 500px; /* narrower = less vertical stacking */
  font-family: 'Baloo 2', cursive;
  color: #2f2f2f;
}

/* Title */
#instructions h1 {
  margin: 0;
  font-size: 30px; /* slightly smaller */
}

/* Subtitle */
.subtitle {
  margin: 4px 0 6px 0; /* tighter spacing */
  font-size: 18px;
}

/* Main text */
#instructions p {
  margin: 2px 0; /* reduce vertical gaps */
  font-size: 10px;
  line-height: 1.3;
}

/* Note */
.note {
  margin-top: 4px;
  font-size: 14px;
  opacity: 0.6;
}
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>

    <script src="js/micro-project progress1.js"></script>

    </head>

  <body>
    <div id="instructions">
      <h1>Blind Box</h1>
      <p class="subtitle">How to play</p>
      <p>Click the cube to reveal a random shape.</p>
      <p>Match the 3 target shapes from left to right.</p>
      <p class="note">* You don’t need to wait for shapes to stop moving! *</p>
    </div>
  </body>
</html>
